<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToxiGuard Insights | Professional Regulatory Intelligence</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1>ToxiGuard Insights</h1>
            <p>Advancing Regulatory Science through Structured Intelligence</p>
        </div>
    </header>

    <main class="container">
        
        <!-- Daily Pharmaline Section -->
        <section class="pharmaline-section">
            <div class="pharmaline-header">
                <h2>Daily Pharmaline</h2>
                <span class="pharmaline-badge">LIVE UPDATES</span>
            </div>
            <ul id="pharmaline-container" class="pharmaline-list">
                <!-- Posts will be loaded here dynamically -->
            </ul>
        </section>

        <h3 class="section-title">Deep Analysis & Reports</h3>
        
        <div id="blog-grid-container" class="blog-grid">
            <!-- Posts will be loaded here dynamically -->
        </div>

    </main>

    <!-- Post Viewer Modal -->
    <div id="post-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; overflow-y:auto; padding:2rem;">
        <div class="container" style="background:white; padding:3.5rem; border-radius:16px; position:relative; max-width:850px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <button onclick="closePost()" style="position:absolute; top:1.5rem; right:1.5rem; border:none; background:#f1f5f9; width:40px; height:40px; border-radius:50%; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: background 0.2s;">&times;</button>
            <div id="post-viewer-content" class="prose"></div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 ToxiGuard Insights. All rights reserved.</p>
            <p style="font-size: 0.8rem; opacity: 0.7;">This platform provides independent regulatory analysis and is not affiliated with the FDA.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Set marked options for better security and parsing
        marked.setOptions({
            headerIds: false,
            mangle: false,
            breaks: true
        });

        async function openPost(postId) {
            console.log('Attempting to open post:', postId);
            const modal = document.getElementById('post-modal');
            const viewer = document.getElementById('post-viewer-content');
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            viewer.innerHTML = '<div style="text-align:center; padding:3rem;"><div class="spinner"></div><p>Loading Intelligence Report...</p></div>';
            
            try {
                const response = await fetch(`posts/${postId}.md`);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                
                const text = await response.text();
                const cleanText = text.replace(/^---[\s\S]*?---/, '');
                viewer.innerHTML = marked.parse(cleanText);
                
                viewer.querySelectorAll('img').forEach(img => {
                    img.style.maxWidth = '100%';
                    img.style.height = 'auto';
                    img.style.borderRadius = '8px';
                    img.style.margin = '2rem 0';
                });
                console.log('Post loaded successfully:', postId);
            } catch (error) {
                console.error('Error loading post:', error);
                let errorMsg = `Could not load the requested post (${postId}).`;
                if (window.location.protocol === 'file:') {
                    errorMsg += '<br><br><strong>Note:</strong> Browsers block local file access for security. Please use a local server or view the live GitHub Pages site.';
                }
                viewer.innerHTML = `<div style="text-align:center; padding:3rem; color:#ef4444;"><h3>Access Error</h3><p>${errorMsg}</p></div>`;
            }
        }

        function closePost() {
            document.getElementById('post-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function initBlog() {
            console.log('Initializing blog engine...');
            try {
                const response = await fetch('blog_metadata.json');
                if (!response.ok) throw new Error(`Metadata Error: ${response.status}`);
                const data = await response.json();
                
                const lineContainer = document.getElementById('pharmaline-container');
                lineContainer.innerHTML = ''; // Clear container
                data.daily_pharmaline.forEach(post => {
                    const li = document.createElement('li');
                    li.className = 'pharmaline-item';
                    li.style.cursor = 'pointer';
                    li.innerHTML = `
                        <span class="pharmaline-item-title">${post.title}</span>
                        <span class="pharmaline-item-date">${post.date}</span>
                    `;
                    li.onclick = () => openPost(post.id);
                    lineContainer.appendChild(li);
                });

                const gridContainer = document.getElementById('blog-grid-container');
                gridContainer.innerHTML = ''; // Clear container
                data.featured_posts.forEach(post => {
                    const article = document.createElement('article');
                    article.className = 'post-card';
                    article.style.cursor = 'pointer';
                    article.innerHTML = `
                        <div class="post-content">
                            <div class="post-category">${post.category}</div>
                            <h4 class="post-title">${post.title}</h4>
                            <p class="post-excerpt">${post.excerpt}</p>
                            <div class="post-meta">
                                <span>By ${post.author}</span>
                                <span>${post.date}</span>
                            </div>
                        </div>
                    `;
                    article.onclick = () => openPost(post.id);
                    gridContainer.appendChild(article);
                });
                console.log('Blog engine initialized successfully.');
            } catch (error) {
                console.error('Blog initialization failed:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', initBlog);
    </script>
</body>
</html>
